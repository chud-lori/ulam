<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wedding Invitation Templates</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Press Start 2P',ui-monospace,monospace;color:#3a2b26;
    background:linear-gradient(180deg,#f3c8d2 0%,#f7ddc9 55%,#e9f1d0 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:28px;text-align:center;padding:24px;line-height:1.8;}
  h1{font-size:clamp(14px,4vw,26px);color:#c75d75;text-shadow:2px 2px 0 #fff;}
  p{font-size:clamp(8px,2.4vw,11px);opacity:.8;}
  .templates{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;}
  a.card{display:block;text-decoration:none;color:#fff;background:#e8889c;
    border-radius:12px;padding:20px 26px;font-size:clamp(9px,2.6vw,13px);
    box-shadow:0 5px 0 #c75d75;transition:transform .05s,box-shadow .05s;}
  a.card:active{transform:translateY(4px);box-shadow:0 1px 0 #c75d75;}
  small{opacity:.5;font-size:7px;}
</style>
</head>
<body>
  <h1>💌 Wedding Invitations</h1>
  <p>Choose a template:</p>
  <div class="templates">
    <a class="card" href="game/">🏙️ A Stroll Through Town</a>
    <a class="card" href="storybook/">📖 Our Story Scrapbook</a>
    <a class="card" href="library/">📚 The Library of Us</a>
    <a class="card" href="scroll/">🌸 The Long Scroll</a>
    <!-- Add more templates here, e.g. <a class="card" href="garden/">🌸 Garden</a> -->
  </div>
  <small>more templates coming soon</small>
</body>
</html>
