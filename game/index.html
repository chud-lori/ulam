<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>A Stroll to Our Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#3a2b26; --rose:#e8889c; --rose-dk:#c75d75; --gold:#e3b04b; --panel:#fffaf2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:#f4cbbf;}
  body{font-family:'Press Start 2P', ui-monospace,"Courier New",monospace; color:var(--ink);
    -webkit-font-smoothing:none; touch-action:none; user-select:none;}
  #game{display:block;width:100vw;height:100vh;image-rendering:pixelated;}

  /* loading + title */
  #titleScreen{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;gap:24px;padding:24px;
    background:linear-gradient(180deg,#f3c8d2 0%,#f7ddc9 55%,#e9f1d0 100%);
    clip-path:circle(150% at 50% 56%);transition:clip-path .75s ease-in, opacity .75s ease-in;}
  /* arcade "iris-in": the title closes to a shrinking circle, revealing the town */
  #titleScreen.iris{clip-path:circle(0% at 50% 56%);opacity:0;}
  #startBtn:not([disabled]){animation:press 1.05s steps(1) infinite;}
  @keyframes press{50%{filter:brightness(1.25)}}
  #titleScreen h1{font-size:clamp(16px,4.2vw,30px);line-height:1.7;color:var(--rose-dk);
    text-shadow:2px 2px 0 #fff,4px 4px 0 rgba(0,0,0,.08);}
  #titleScreen .amp{color:var(--gold);}
  #titleScreen p{font-size:clamp(8px,2.4vw,12px);line-height:2;color:var(--ink);}
  .btn{font-family:inherit;cursor:pointer;border:none;background:var(--rose);color:#fff;
    padding:16px 22px;font-size:clamp(9px,2.6vw,13px);border-radius:10px;box-shadow:0 5px 0 var(--rose-dk);
    transition:transform .05s,box-shadow .05s;}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--rose-dk);}
  .btn[disabled]{opacity:.5;cursor:wait;box-shadow:0 5px 0 #b9b0a6;background:#cfc7bd;}
  #coupleHero{display:none;max-width:min(72vw,330px);max-height:36vh;image-rendering:auto;
    margin-bottom:2px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.18));animation:floaty 3s ease-in-out infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .heartbeat{display:inline-block;animation:beat 1.1s ease-in-out infinite;}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}

  /* HUD */
  #hud{position:fixed;inset:0;z-index:20;pointer-events:none;}
  #hint{position:absolute;left:50%;bottom:118px;transform:translateX(-50%);background:var(--panel);
    border:3px solid var(--ink);border-radius:8px;padding:10px 14px;font-size:10px;line-height:1.6;
    box-shadow:0 4px 0 rgba(0,0,0,.15);opacity:0;transition:opacity .15s;text-align:center;max-width:80vw;}
  #hint.show{opacity:1;}
  #hint b{color:var(--rose-dk);}
  #progress{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,250,242,.9);
    border:2px solid var(--ink);border-radius:20px;padding:7px 12px;font-size:9px;white-space:nowrap;}
  #progress .dot{color:#d8cabd;} #progress .dot.on{color:var(--rose);}
  #musicBtn{position:absolute;top:12px;right:12px;pointer-events:auto;width:46px;height:46px;border-radius:50%;
    border:3px solid var(--ink);background:var(--panel);cursor:pointer;font-size:16px;box-shadow:0 3px 0 rgba(0,0,0,.18);}
  .pad{position:absolute;bottom:24px;width:74px;height:74px;pointer-events:auto;border-radius:14px;
    border:3px solid var(--ink);background:rgba(255,250,242,.82);font-size:22px;display:flex;align-items:center;
    justify-content:center;box-shadow:0 4px 0 rgba(0,0,0,.18);cursor:pointer;touch-action:none;}
  .pad:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.18);}
  #padLeft{left:18px;} #padRight{left:104px;}
  #padAct{right:18px;background:var(--rose);color:#fff;border-color:var(--rose-dk);width:92px;font-size:11px;}

  /* Modal (quest popup) */
  #modalWrap{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    background:rgba(40,28,32,.6);padding:18px;backdrop-filter:blur(2px);}
  #modalWrap.show{display:flex;}
  #modal{background:var(--panel);border:4px solid var(--ink);border-radius:16px;max-width:560px;width:100%;
    max-height:90vh;overflow:auto;padding:22px;box-shadow:0 12px 0 rgba(0,0,0,.25);animation:pop .2s ease-out;}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  #closeBtn{float:right;background:none;border:none;cursor:pointer;font-family:inherit;font-size:16px;color:var(--ink);}
  /* polaroid photo */
  .polaroid{background:#fff;border:1px solid #eadfce;border-radius:4px;padding:10px 10px 14px;
    box-shadow:0 6px 14px rgba(0,0,0,.18);max-width:300px;margin:6px auto 16px;transform:rotate(-2deg);}
  .polaroid img{display:block;width:100%;border-radius:2px;background:#f3e9da;image-rendering:auto;}
  .polaroid .cap{font-size:8px;text-align:center;margin-top:8px;color:#a08a7d;line-height:1.6;}
  #modal .ico{font-size:30px;text-align:center;display:block;margin-bottom:6px;}
  #modal h2{font-size:14px;color:var(--rose-dk);text-align:center;line-height:1.7;margin-bottom:16px;}
  #modal p{font-size:10px;line-height:2;margin-bottom:12px;}
  #modal .ph{color:var(--rose-dk);background:#fde9ee;padding:1px 4px;border-radius:3px;}
  #modal .detail{display:flex;gap:10px;align-items:flex-start;margin-bottom:13px;font-size:10px;line-height:1.8;}
  #modal .detail .k{color:var(--rose-dk);min-width:70px;}
  #modal .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
  #modal .mini{font-size:9px;padding:13px 14px;flex:1;}
  #modal label{display:block;font-size:9px;margin-bottom:6px;}
  #modal input,#modal select,#modal textarea{width:100%;font-family:inherit;font-size:10px;padding:11px 10px;
    border:3px solid var(--ink);border-radius:8px;background:#fff;color:var(--ink);}
  #modal .row{margin-bottom:13px;} #modal .ok{color:#2c7a3f;text-align:center;font-size:11px;line-height:2;}
  /* title: guest greeting + countdown */
  #guestGreet{font-size:clamp(8px,2.4vw,11px);color:var(--rose-dk);background:#fff7;border:2px solid var(--rose-dk);
    border-radius:20px;padding:7px 14px;line-height:1.6;display:none;max-width:90vw;
    white-space:normal;overflow-wrap:anywhere;text-align:center;}
  #countdown{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  #countdown .cd{background:var(--panel);border:2px solid var(--ink);border-radius:8px;padding:6px 9px;min-width:46px;
    box-shadow:0 3px 0 rgba(0,0,0,.12);}
  #countdown .cd b{display:block;font-size:clamp(11px,3vw,16px);color:var(--rose-dk);}
  #countdown .cd span{font-size:6px;opacity:.7;letter-spacing:1px;}
  /* couple profiles */
  .profiles{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .pcard{flex:1;min-width:130px;text-align:center;}
  .pavatar{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid var(--rose-dk);
    background:#f3e9da;image-rendering:auto;}
  .prole{font-size:8px;color:var(--rose-dk);margin-top:8px;}
  .pname{font-size:11px;line-height:1.6;margin:4px 0;}
  .pparents{font-size:8px;opacity:.7;line-height:1.7;}
  .pig{font-size:8px;color:var(--rose-dk);}
  .pamp{font-size:20px;color:var(--gold);}
  /* book registry */
  .books{display:flex;flex-direction:column;gap:8px;margin:6px 0;}
  .book{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#fff;border:2px solid var(--ink);
    border-radius:8px;padding:9px 11px;font-size:9px;line-height:1.5;flex-wrap:wrap;}
  .book .bk i{opacity:.7;}
  .claim{font-family:inherit;font-size:8px;cursor:pointer;background:var(--rose);color:#fff;border:none;
    border-radius:6px;padding:7px 9px;box-shadow:0 3px 0 var(--rose-dk);}
  .claim:active{transform:translateY(2px);box-shadow:0 1px 0 var(--rose-dk);}
  .taken{font-size:8px;color:#2c7a3f;}
  /* wishes wall */
  .wishes{margin-top:8px;display:flex;flex-direction:column;gap:8px;max-height:230px;overflow:auto;}
  .wish{background:#fff6f8;border:2px solid #f3c8d2;border-radius:8px;padding:9px 11px;font-size:9px;line-height:1.7;}
  .wish b{color:var(--rose-dk);display:block;margin-bottom:2px;}
  #venueCd{margin-top:10px;font-size:9px;color:var(--rose-dk);text-align:center;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="progress"></div>
  <button id="musicBtn" title="Music">🔇</button>
  <div id="hint"></div>
  <div class="pad" id="padLeft">◀</div>
  <div class="pad" id="padRight">▶</div>
  <div class="pad" id="padAct">VISIT</div>
</div>

<div id="titleScreen">
  <p id="guestGreet"></p>
  <img id="coupleHero" alt="" />
  <h1 id="coupleNames">&nbsp;</h1>
  <p>are getting married!<br/><br/>Take a stroll through our little town<br/>and discover our story &amp; the details.</p>
  <div id="countdown" aria-label="countdown"></div>
  <button class="btn" id="startBtn" disabled><span class="heartbeat">💍</span>&nbsp; <span id="startLabel">Loading…</span></button>
  <p style="opacity:.7;font-size:8px;">Arrow keys / A&nbsp;D to walk &nbsp;·&nbsp; Space to visit<br/>(on phone, use the buttons below)</p>
  <p style="opacity:.45;font-size:7px;line-height:1.8;">Art: 2D Pixel City Pack (CC-BY 4.0) · LPC characters (CC-BY-SA)</p>
</div>

<div id="modalWrap"><div id="modal"></div></div>

<!-- SHARED content for all templates (one source of truth): defines window.WEDDING -->
<script src="../data.js"></script>
<!-- git-ignored real keys (Firebase etc.); optional, overrides data.js defaults -->
<script src="../config.local.js" onerror="/* absent on showcase — runs key-free */"></script>
<!-- SHARED opening effects (petals / entrance / typewriter) -->
<script src="../fx.js"></script>
<!-- SHARED live backend (RSVP / wishes / book-claims) via Firebase (optional) -->
<script type="module" src="../firebase.js"></script>
<!-- SHARED music widget (YouTube bg track + guest playlist; from window.MUSIC) -->
<script src="../music.js" defer></script>
<script>
"use strict";
/* ===================================================================
   A STROLL TO OUR WEDDING  ·  side-scrolling pixel invitation
   Art: 2D Pixel City Pack (CC-BY 4.0) · LPC characters (CC-BY-SA/GPL)
   --- To personalise, edit data.js (NOT this file). ---
   This file is the game engine; WEDDING + RSVP_EMAIL are defined in data.js.
   =================================================================== */

/* ---------- 2. ASSETS ---------- */
const ASSET_SRC = {
  sky:"assets/sky.png", skyline:"assets/skyline.png",
  shop:"assets/build_shop.png", club:"assets/build_club.png", apartment:"assets/build_apartment.png",
  tree1:"assets/tree1.png", tree2:"assets/tree2.png", tree3:"assets/tree3.png",
  bus:"assets/bus.png", barrel:"assets/barrel.png", signbus:"assets/sign_bus.png",
  groom:"assets/groom_walk.png", bride:"assets/bride_walk.png",
  groomLpc:"assets/groom_lpc.png", brideLpc:"assets/bride_lpc.png",  // smooth hand-animated walk
  headGroom:"assets/head_groom.png", headBride:"assets/head_bride.png",  // chibi faces for lpc bodies
  // OPTIONAL custom chibi art — drop these in to replace the pixel couple.
  // Front-facing, transparent background. See assets/CHARACTERS_README.txt
  groomChibi:"assets/groom.png", brideChibi:"assets/bride.png", couple:"../photos/couple.png",
};
const IMG = {};
let loaded=0, total=Object.keys(ASSET_SRC).length;
function preload(done){
  const lbl=document.getElementById("startLabel");
  const tick=()=>{ loaded++; lbl.textContent = loaded<total?`Loading… ${loaded}/${total}`:"▶ PRESS START";
    if(loaded>=total) done(); };
  for(const k in ASSET_SRC){
    const im=new Image(); IMG[k]=im; im.ok=false;
    im.onload=()=>{ im.ok=im.naturalWidth>0; tick(); };
    im.onerror=tick;               // optional files may be absent — don't block
    im.src=ASSET_SRC[k];
  }
}
const haveChibi=()=> IMG.groomChibi.ok && IMG.brideChibi.ok;

/* ---------- 3. CANVAS / VIEW ---------- */
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
let W=0,H=0,dpr=1;
const VIEW_H=240;            // logical world height (smaller = more zoomed-in / closer)
let scale=1, VIEW_W=400;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+"px"; canvas.style.height=H+"px";
  scale=H/VIEW_H; VIEW_W=W/scale;
}
addEventListener("resize",resize); resize();

/* ---------- 3b. THEME ADAPTER ----------
   Shared content lives in window.WEDDING (../data.js, theme-agnostic).
   This template turns it into "spots" (buildings along the street). Only
   the game cares about buildings/icons — other themes render WEDDING differently. */
const WEDDING = window.WEDDING;
const RSVP_EMAIL = WEDDING.rsvpEmail || "";
const STORY_BLD = ["shop","park","club","shop","apartment"]; // building per story beat (cycles)
const SPOTS = [
  { id:"profiles", type:"profiles", icon:"💑", sign:"Meet Us", title:"Meet the Couple", building:"apartment" },
  ...WEDDING.story.map((s,i)=>({ id:s.id, type:"story", icon:s.icon, sign:s.label, title:s.title,
      photo:s.photo, html:s.html, building:STORY_BLD[i%STORY_BLD.length] })),
  { id:"venue", type:"venue", icon:"💒", sign:"The Wedding", title:"You're Invited!", photo:"venue.jpg", building:"apartment" },
  { id:"reception", type:"agenda", icon:"🎉", sign:"The Party", title:"Order of the Day", building:"club" },
  { id:"gift", type:"gift", icon:"📚", sign:"Gift a Book", title:"Gift Us a Book", building:"shop" },
  { id:"guestbook", type:"guestbook", icon:"💬", sign:"Wishes", title:"Leave Us a Wish", building:"shop" },
  { id:"rsvp", type:"rsvp", icon:"💌", sign:"RSVP", title:"Will You Join Us?", building:"apartment" },
];

/* ---------- 4. WORLD ---------- */
const GROUND=202;                 // logical y where feet/buildings rest
const FRAME=64;
const BUILD={ shop:{h:118}, apartment:{h:150}, club:{h:135} };
// place spots along the street
const FIRST=360, GAP=520;
SPOTS.forEach((s,i)=> s.x = FIRST + i*GAP);
const WORLD_W = FIRST + (SPOTS.length-1)*GAP + 420;

const player={x:140, dir:1, walking:false, step:0, frame:0};
let camera=0, started=false;
const visited=new Set();
const hearts=[];

// scenery (trees / props) scattered between spots
const decor=[];
(function buildDecor(){
  const trees=["tree1","tree2","tree3"];
  for(const s of SPOTS){
    // a tree just before each building (skip the park, it makes its own grove)
    if(s.building!=="park") decor.push({type:"tree", img:trees[(s.x)%3], x:s.x-150, h:92, back:true});
  }
  decor.push({type:"bus", x:SPOTS[1].x+170, h:46});
  decor.push({type:"sign", x:SPOTS[1].x+250, h:64});
  decor.push({type:"barrel", x:SPOTS[0].x+95, h:24});
  decor.push({type:"barrel", x:SPOTS[0].x+118, h:24});
  // lamp posts evenly
  for(let x=240;x<WORLD_W;x+=260) decor.push({type:"lamp", x, h:78});
})();

/* ---------- 5. INPUT ---------- */
const keys={left:false,right:false}; let wantInteract=false;
addEventListener("keydown",e=>{
  if(["ArrowLeft","ArrowRight","ArrowUp"," ","Enter","a","d","A","D"].includes(e.key)) e.preventDefault();
  if(e.key==="ArrowLeft"||e.key.toLowerCase()==="a") keys.left=true;
  if(e.key==="ArrowRight"||e.key.toLowerCase()==="d") keys.right=true;
  if(e.key===" "||e.key==="Enter"||e.key==="ArrowUp") wantInteract=true;
  if(e.key==="Escape") closeModal();
});
addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft"||e.key.toLowerCase()==="a") keys.left=false;
  if(e.key==="ArrowRight"||e.key.toLowerCase()==="d") keys.right=false;
});
function bindPad(id,on,off){
  const el=document.getElementById(id);
  const s=e=>{e.preventDefault();on();}, en=e=>{e.preventDefault();off&&off();};
  el.addEventListener("touchstart",s,{passive:false}); el.addEventListener("touchend",en,{passive:false});
  el.addEventListener("mousedown",s); el.addEventListener("mouseup",en); el.addEventListener("mouseleave",en);
}
bindPad("padLeft",()=>keys.left=true,()=>keys.left=false);
bindPad("padRight",()=>keys.right=true,()=>keys.right=false);
bindPad("padAct",()=>wantInteract=true);

/* ---------- 6. AUDIO ---------- */
let audioCtx=null,musicOn=false,musicTimer=null,master=null;
const melody=[0,4,7,12,7,4,0,4,5,9,12,9,7,4,0,-3,0,4,7,12,14,12,9,7,5,7,9,5,4,0,0,0];
const f=s=>220*Math.pow(2,s/12);
function initAudio(){ if(audioCtx)return; audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  master=audioCtx.createGain(); master.gain.value=0.15; master.connect(audioCtx.destination); }
function blip(fr,d,t,ty,v){ const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=ty;o.frequency.value=fr;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+d);o.connect(g);g.connect(master);o.start(t);o.stop(t+d); }
let mi=0,mt=0;
function schedule(){ if(!musicOn)return; const ahead=audioCtx.currentTime+0.2;
  while(mt<ahead){ const n=melody[mi%melody.length]; blip(f(n),0.22,mt,"triangle",0.5);
    if(mi%4===0) blip(f(n-12),0.42,mt,"sine",0.32); mt+=0.26; mi++; } }
function toggleMusic(){ initAudio(); if(audioCtx.state==="suspended")audioCtx.resume(); musicOn=!musicOn;
  document.getElementById("musicBtn").textContent=musicOn?"🎵":"🔇";
  if(musicOn){mt=audioCtx.currentTime+0.1;musicTimer=setInterval(schedule,80);} else clearInterval(musicTimer); }
document.getElementById("musicBtn").addEventListener("click",toggleMusic);
let lastStep=0;
function footstep(){ if(!audioCtx||audioCtx.state!=="running")return; const t=audioCtx.currentTime;
  if(t-lastStep<0.18)return; lastStep=t; blip(95,0.05,t,"square",0.18); }

/* ---------- 7. DRAW ---------- */
function imgWorld(img,cx,bottomY,h){ if(!img||!img.width)return; const w=h*img.width/img.height;
  ctx.drawImage(img,Math.round(cx-w/2),Math.round(bottomY-h),Math.round(w),Math.round(h)); }

function drawSky(){
  ctx.setTransform(dpr,0,0,dpr,0,0); ctx.imageSmoothingEnabled=false;
  if(IMG.sky.width) ctx.drawImage(IMG.sky,0,0,W,H); else { ctx.fillStyle="#f3c8d2"; ctx.fillRect(0,0,W,H); }
  // soft clouds (parallax)
  ctx.fillStyle="rgba(255,255,255,.55)";
  for(let i=0;i<5;i++){ const cw=120, x=((i*340 - camera*0.15*scale)% (W+260))-130, y=40+i*22%90;
    ctx.beginPath(); ctx.ellipse(x,y,cw,26,0,0,7); ctx.ellipse(x+60,y-14,70,22,0,0,7); ctx.fill(); }
}
function drawSkyline(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const img=IMG.skyline; if(!img.width)return;
  const dh=H*0.42, dw=dh*img.width/img.height;
  const baseY=GROUND*scale - dh + 12;
  let off=-((camera*0.4*scale)%dw); if(off>0) off-=dw;
  ctx.globalAlpha=0.55;
  for(let x=off;x<W+dw;x+=dw) ctx.drawImage(img,x,baseY,dw,dh);
  ctx.globalAlpha=1;
}
function worldTransform(){ ctx.setTransform(scale*dpr,0,0,scale*dpr, -Math.round(camera*scale)*dpr,0);
  ctx.imageSmoothingEnabled=false; }

function drawGround(){
  worldTransform();
  // grass
  ctx.fillStyle="#8fce7e"; ctx.fillRect(camera-10,GROUND,VIEW_W+20,VIEW_H-GROUND+80);
  ctx.fillStyle="#7cc06a"; ctx.fillRect(camera-10,GROUND,VIEW_W+20,4);
  // sidewalk band
  ctx.fillStyle="#d9c6a6"; ctx.fillRect(camera-10,GROUND+14,VIEW_W+20,12);
  ctx.fillStyle="#c7b18d";
  for(let x=Math.floor(camera/24)*24;x<camera+VIEW_W+24;x+=24) ctx.fillRect(x,GROUND+14,2,12);
}
function drawDecorBack(){ worldTransform();
  for(const d of decor){ if(d.back) drawDecor(d); } }
function drawDecorFront(){ worldTransform();
  for(const d of decor){ if(!d.back) drawDecor(d); } }
function drawDecor(d){
  switch(d.type){
    case "tree":   imgWorld(IMG[d.img],d.x,GROUND+8,d.h); break;
    case "bus":    imgWorld(IMG.bus,d.x,GROUND+10,d.h); break;
    case "sign":   imgWorld(IMG.signbus,d.x,GROUND+8,d.h); break;
    case "barrel": imgWorld(IMG.barrel,d.x,GROUND+8,d.h); break;
    case "lamp":   lamp(d.x); break;
  }
}
function lamp(x){
  ctx.fillStyle="#4a4036"; ctx.fillRect(x-2,GROUND-78,4,86);
  ctx.fillStyle="#5a4e42"; ctx.fillRect(x-7,GROUND-84,14,8);
  ctx.fillStyle="#ffe9a8"; ctx.fillRect(x-5,GROUND-82,10,6);
  ctx.fillStyle="rgba(255,233,168,.20)"; ctx.beginPath(); ctx.arc(x,GROUND-79,9,0,7); ctx.fill();
}

function drawBunting(){ worldTransform();
  const cols=["#e8889c","#fff","#e3b04b","#9bc7e8"]; const y0=70, amp=14, span=34;
  ctx.lineWidth=1.5; ctx.strokeStyle="rgba(120,90,80,.5)";
  for(let x=Math.floor(camera/span)*span; x<camera+VIEW_W+span; x+=span){
    const sag=Math.sin(x*0.05)*4;
    ctx.beginPath(); ctx.moveTo(x,y0+Math.sin(x*0.05)*amp);
    ctx.quadraticCurveTo(x+span/2,y0+amp+6+sag,x+span,y0+Math.sin((x+span)*0.05)*amp); ctx.stroke();
    const fy=y0+amp+4+sag;
    ctx.fillStyle=cols[(x/span|0)%cols.length];
    ctx.beginPath(); ctx.moveTo(x+span/2-6,fy); ctx.lineTo(x+span/2+6,fy); ctx.lineTo(x+span/2,fy+11); ctx.fill();
  }
}

function drawSpots(){ worldTransform();
  for(const s of SPOTS){
    if(s.x-camera < -260 || s.x-camera > VIEW_W+260) continue;
    let topY;
    if(s.building==="park"){ topY=drawPark(s.x); }
    else { const b=BUILD[s.building]; imgWorld(IMG[s.building], s.x, GROUND+8, b.h); topY=GROUND+8-b.h; }
    sign(s.x, topY-6, s.icon, s.sign, visited.has(s.id));
  }
}
function drawPark(x){
  imgWorld(IMG.tree1,x-46,GROUND+8,104);
  imgWorld(IMG.tree3,x+44,GROUND+8,96);
  // bench
  ctx.fillStyle="#9c6b44"; ctx.fillRect(x-26,GROUND-16,52,6); ctx.fillRect(x-26,GROUND-30,52,6);
  ctx.fillStyle="#7a4a32"; ctx.fillRect(x-22,GROUND-16,5,16); ctx.fillRect(x+17,GROUND-16,5,16);
  return GROUND-92;
}
function sign(x,y,icon,label,done){
  ctx.textAlign="center"; ctx.textBaseline="middle";
  const bob=Math.sin(now/420+x)*3;
  const w=Math.max(86,label.length*7.4+34), h=26, yy=y+bob-h;
  // ropes
  ctx.strokeStyle="#7a5a48"; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(x-w/2+8,yy); ctx.lineTo(x-w/2+8,yy-10); ctx.moveTo(x+w/2-8,yy); ctx.lineTo(x+w/2-8,yy-10); ctx.stroke();
  // board
  ctx.fillStyle=done?"#cfe9c4":"#fff7e9"; ctx.strokeStyle="#3a2b26"; ctx.lineWidth=2;
  roundRect(x-w/2,yy,w,h,5); ctx.fill(); ctx.stroke();
  ctx.font="11px 'Press Start 2P',monospace"; ctx.fillStyle="#3a2b26"; ctx.fillText(icon,x-w/2+14,yy+h/2+1);
  ctx.font="7px 'Press Start 2P',monospace"; ctx.fillStyle=done?"#2c7a3f":"#c75d75";
  ctx.fillText((done?"✓ ":"")+label, x+8, yy+h/2+1);
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* Walk-cycle sheets: one horizontal row of N cells, character facing RIGHT.
   Two styles — flip WALK_STYLE to compare:
     "lpc"   = hand-animated pixel walk (real gait, very smooth; smaller face)
     "chibi" = the cute AI-generated chibi frames (big face; march-in-place) */
const WALK_STYLE = "lpc";
// "lpc" draws a smooth pixel walking BODY and overlays the cute chibi HEAD on top
// (big-head/chibi look = smooth gait + a real visible face). head.h = head height in
// 64px cell units; ax/ay = per-frame head anchor (centre-x, top-y) from each LPC sheet.
const WALK_SETS = {
  lpc:   { th:84, bot:2, dx:15, tween:false,
           groom:{key:"groomLpc", n:9, fw:64, fh:64, idle:0,
                  head:{key:"headGroom", h:24, ax:[31,32,31,30,29,29,29,30,30], ay:[14,15,14,14,14,15,14,14,14]}},
           bride:{key:"brideLpc", n:9, fw:64, fh:64, idle:0,
                  head:{key:"headBride", h:25, ax:[29,29,29,29,29,30,29,29,29], ay:[15,16,15,15,15,16,15,15,15]}} },
  chibi: { th:80, bot:4, dx:30, tween:true,
           groom:{key:"groom", n:10, fw:158, fh:271, idle:0},
           bride:{key:"bride", n:8,  fw:178, fh:293, idle:0} },
};
const SET = WALK_SETS[WALK_STYLE];
const CHAR_TH = SET.th, CHAR_BOT = SET.bot;
function drawCouple(){ worldTransform();
  const cx=player.x, by=GROUND+6, dx=SET.dx;
  const walking=player.walking, flip=player.dir<0, s=player.step;
  player.frame=Math.floor(s);
  // Same facing rule whether walking or idle: face the last travel direction so they
  // don't snap around when you stop. Sheets face right -> flip when heading left.
  function one(meta,px){
    const img=IMG[meta.key];
    if(!walking){ char(img,meta,meta.idle,px,by,flip,1,0); return; }
    const base=Math.floor(s), frac=s-base;
    const f0=base%meta.n, f1=(base+1)%meta.n;
    char(img,meta,f0,px,by,flip,1,0);
    // chibi frames are hard-cut AI poses -> crossfade to smooth them; the LPC cycle is
    // already a real gait, so it plays straight (tweening pixel art just ghosts).
    if(SET.tween && frac>0.02) char(img,meta,f1,px,by,flip,frac,0);
  }
  if(!flip){ one(SET.groom,cx-dx); one(SET.bride,cx+dx); }
  else     { one(SET.bride,cx-dx); one(SET.groom,cx+dx); }
  // little hand-link heart
  if(Math.sin(now/300)>0.5){ ctx.fillStyle="#e8889c"; ctx.font="9px 'Press Start 2P',monospace";
    ctx.textAlign="center"; ctx.fillText("♥",cx,by-CHAR_TH*0.6); }
}
function char(img,meta,fi,cx,by,flip,alpha,yoff){
  if(!img||!img.ok)return;
  const k=CHAR_TH/meta.fh, dw=meta.fw*k, dh=CHAR_TH;
  const top=by-dh+CHAR_BOT*k+(yoff||0);    // map the cell's feet baseline onto `by`
  ctx.save();
  if(alpha!=null && alpha<1) ctx.globalAlpha=alpha;
  ctx.translate(cx,0); if(flip) ctx.scale(-1,1);
  ctx.drawImage(img, fi*meta.fw,0,meta.fw,meta.fh, -dw/2, top, dw, dh);
  // overlay the chibi head (for the lpc style) so the smooth body has a visible face
  const H=meta.head, hi=H&&IMG[H.key];
  if(hi&&hi.ok){
    const hh=H.h*k, hw=hi.naturalWidth*hh/hi.naturalHeight;
    const ax=H.ax[fi]!=null?H.ax[fi]:H.ax[0], ay=H.ay[fi]!=null?H.ay[fi]:H.ay[0];
    ctx.imageSmoothingEnabled=true;        // head is a smooth illustration, not pixel art
    ctx.drawImage(hi, (-dw/2 + ax*k) - hw/2, top + (ay-2)*k, hw, hh);
    ctx.imageSmoothingEnabled=false;
  }
  ctx.restore();
}
function drawHearts(){ worldTransform(); ctx.textAlign="center";
  for(const h of hearts){ ctx.globalAlpha=Math.max(0,h.a); ctx.fillStyle="#e8889c";
    ctx.font=h.s+"px 'Press Start 2P',monospace"; ctx.fillText("♥",h.x,h.y); }
  ctx.globalAlpha=1; }

function draw(){
  drawSky(); drawSkyline();
  drawGround(); drawBunting(); drawDecorBack(); drawSpots(); drawDecorFront();
  drawCouple(); drawHearts();
}

}

/* ---------- 10. LOOP ---------- */
let now=0,last=0;
function loop(t){
  now=t; const dt=Math.min(40,t-last||16); last=t;
  player.walking=false;
  let moved=0;
  if(started&&!modalOpen){
    const spd=0.085*dt;
    if(keys.left&&player.x>110){ player.x-=spd; player.dir=-1; player.walking=true; moved=spd; }
    if(keys.right&&player.x<WORLD_W-90){ player.x+=spd; player.dir=1; player.walking=true; moved=spd; }
  }
  // advance the walk cycle by DISTANCE TRAVELLED (not a timer) so legs pump in step
  // with the ground instead of sliding. ~5 world units per sprite frame = brisk stride.
  if(player.walking){ const prev=Math.floor(player.step); player.step+=moved/4.0;
    if(Math.floor(player.step)!==prev) footstep(); }
  // camera: tight follow, clamped (no floaty over-speed)
  const target=Math.max(0,Math.min(WORLD_W-VIEW_W, player.x-VIEW_W*0.42));
  camera += (target-camera)*Math.min(1,0.18*dt/16);
  if(WORLD_W<VIEW_W) camera=0;
  for(let i=hearts.length-1;i>=0;i--){ const h=hearts[i]; h.y+=h.vy*dt/16; h.a-=0.012*dt/16; if(h.a<=0) hearts.splice(i,1); }
  if(wantInteract){ wantInteract=false; if(!modalOpen){ const s=nearestSpot(); if(s) openSpot(s); } }
  draw(); updateHint();
  requestAnimationFrame(loop);
}

  const ts=document.getElementById("titleScreen");
  ts.classList.add("iris");                       // arcade iris-in to the town
  setTimeout(()=>{ ts.style.display="none"; }, 760);
  started=true; if(!HAS_YT_MUSIC && !musicOn) toggleMusic();
  // deep-link: ?open=rsvp jumps straight to a section (also handy for sharing)
  const open=new URLSearchParams(location.search).get("open");
  if(open){ const s=SPOTS.find(x=>x.id===open); if(s){ player.x=s.x; camera=Math.max(0,s.x-VIEW_W*0.42); openSpot(s); } }
});
requestAnimationFrame(loop);
</script>
</body>
</html>
